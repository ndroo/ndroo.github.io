name: Deploy site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; a newer push waits for (never cancels) a running deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          # normal deploys finish in ~20s; don't wait out a stuck backend
          # (the default is 10 minutes)
          timeout: 180000
      - name: Retry once if the first attempt hung
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 180000
